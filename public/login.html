<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Staf Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Gradient Overlay */
        .bg-gradient-overlay {
            /* Linear gradient: #00A1C5 thick at top-left, fading to right-bottom */
            background: linear-gradient(135deg, rgba(0, 161, 197, 0.95) 0%, rgba(0, 161, 197, 0.7) 40%, rgba(0, 161, 197, 0.1) 100%);
        }
        
        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        /* Input auto-fill styling for Glassmorphism */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.1) inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative bg-cover bg-center bg-no-repeat" style="background-image: url('asset/bg-login.png');">
    
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-overlay z-0"></div>

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-sm px-6 py-8 md:px-8 md:py-8 glass-panel rounded-2xl mx-4">
        
        <!-- Logo -->
        <div class="flex justify-center mb-4">
            <img src="asset/logo-rs-wava-husada.png" alt="Logo Rumah Sakit Wava Husada" class="h-32 object-contain">
        </div>

        <!-- Title -->
        <h2 class="text-center text-xl font-bold text-white mb-6 tracking-wide drop-shadow-sm">
            PORTAL STAF LOGIN
        </h2>

        <!-- Form -->
        <form action="#" method="POST" class="space-y-4">
            
            <!-- Input 1: Nama Pengguna atau NIK -->
            <div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <!-- User Icon -->
                        <svg class="h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <!-- Nilai Default Ditambahkan untuk Login Sementara -->
                    <input type="text" name="username" value="admin123" required
                        class="block w-full pl-10 pr-4 py-2.5 text-sm bg-white/20 border border-white/40 rounded-lg text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition-all backdrop-blur-md shadow-inner"
                        placeholder="Nama Pengguna atau NIK">
                </div>
            </div>

            <!-- Input 2: Kata Sandi -->
            <div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <!-- Lock Icon -->
                        <svg class="h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <!-- Nilai Default Ditambahkan untuk Login Sementara -->
                    <input type="password" name="password" id="password" value="admin123" required
                        class="block w-full pl-10 pr-10 py-2.5 text-sm bg-white/20 border border-white/40 rounded-lg text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition-all backdrop-blur-md shadow-inner"
                        placeholder="Kata Sandi">
                    
                    <!-- Toggle Password Icon -->
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-white hover:text-gray-200 transition-colors focus:outline-none">
                        <svg id="eye-icon" class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <!-- Eye Open -->
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eye-slash-icon" class="h-4 w-4 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <!-- Eye Closed -->
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
                <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-lg text-sm font-bold text-white bg-orange-500 hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-colors duration-200 tracking-wider">
                    MASUK
                </button>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeSlashIcon = document.getElementById('eye-slash-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
